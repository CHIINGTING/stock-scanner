fetcher:
  concurrency: 3          # 同時請求數（預設3，建議不超過5，避免 Yahoo 限速）
  request_delay_ms: 400   # 每個 Worker 請求間隔（ms），建議 300~500
  timeout_sec: 30         # 單次 HTTP 請求 timeout

  # ── Cache 設定 ──────────────────────────────────────────────────────────
  cache_ttl_min: 15       # OHLCV 資料快取時效（分鐘），同一 ticker 15分內不重抓
  cache_dir: ".cache"     # 快取目錄（相對於執行目錄）

  # ── EOF / 連線失敗保護 ───────────────────────────────────────────────────
  # 遇到 EOF 或連線重置後，該 ticker 在 eof_cooldown_min 分鐘內不再請求
  # 避免大量 EOF 時繼續轟炸 Yahoo Finance
  eof_cooldown_min: 5

  # ── 歷史抓取範圍 ────────────────────────────────────────────────────────
  # Yahoo range：6mo / 1y / 2y。越長回測樣本越多（Watchlist 飆股回測建議 ≥1y），
  # 但全市場掃描（--all 數千檔）回應變大、稍慢。預設 2y。
  history_range: "2y"

scanner:
  min_price: 10.0         # 最低收盤價（過濾低價股）
  min_avg_volume: 500000  # MA20 量能門檻
  top_n: 50               # 市場掃描頁顯示前 N 名（--top 旗標可覆蓋）

  # 還原收盤（AdjClose）總開關。預設 false → 所有計算沿用原始 Close，輸出與今日完全一致。
  # 設 true 後，後續 RS / 新高 / VCP / 回測才會改用還原收盤（AdjClose 缺值時自動 fallback Close）。
  use_adjusted_close: false

  # ── RS Rank（C2）─────────────────────────────────────────────────────────
  # 全市場普通股相對強弱百分位。enable_rs_rank=false（預設）時完全不計算、不影響任何
  # 既有 scoring / report / watchlist / rotation。RS 如何納入飆股分數屬後續 C6。
  enable_rs_rank: false                       # 總開關，預設 false
  rs_lookback_days: 120                        # RS 報酬回看交易日數
  rs_min_history_days: 100                     # 不足此歷史長度不計算 RS
  rs_universe_exclude_non_common_stock: true   # 母體只留普通股（排除 ETF/特別股/DR…）
  rs_use_adjusted_close: false                 # 與 use_adjusted_close 取 OR；true 時 RS 用 AdjClose
  rs_leadership_threshold: 80                  # 領導股門檻（C2 僅讀取，尚未接入決策）
  rs_watch_threshold: 70                       # 觀察門檻（C2 僅讀取，尚未接入決策）

  # ── 52 週高 / 多週期新高（C3）─────────────────────────────────────────────
  # enable_new_high=false（預設）時完全不計算、不影響既有 scoring / report /
  # watchlist / rotation。如何納入飆股分數屬後續 C6。新高一律以還原收盤比價。
  enable_new_high: false                       # 總開關，預設 false
  nh_lookbacks: [20, 60, 120, 250]             # 多週期新高視窗（固定 4 檔 → H20/H60/H120/H250）
  nh_min_history_days: 60                       # 不足此歷史長度不計算

  # 距 52 週高三段門檻（距離以「低於高點的百分比」計，越小越接近高點）
  nh_leader_within_pct: 25                      # 距 52 週高 ≤ 此% → new_high_leadership_eligible
  nh_near_52w_high_pct: 15                      # 距 52 週高 ≤ 此% → near_52w_high
  nh_breakout_watch_pct: 5                      # 距 52 週高 ≤ 此% → breakout_watch

  # 以下兩者「僅供 NewHighScore 分級」，不參與上面三個布林旗標的定義
  nh_leader_strong_pct: 10                      # 距 52 週高 ≤ 此% → NewHighScore 最高分級
  nh_leader_far_pct: 50                         # 距 52 週高 > 此% → 非領漲，壓低 NewHighScore

  nh_vol_confirm_ratio: 1.5                     # 60 日新高量增確認門檻（NewHighScore 用）
  nh_overext_rsi: 75                            # 創 250 日高且 RSI ≥ 此值 → 過熱抑制 ×0.6
  nh_use_adjusted_close: false                  # 與 use_adjusted_close 取 OR

  # ── VCP / 波動收縮型態（C4）──────────────────────────────────────────────
  # enable_vcp=false（預設）時完全不計算、不影響既有 scoring / report / watchlist /
  # rotation。如何納入飆股分數屬後續 C6。價格一律以還原收盤計算（close-based）。
  enable_vcp: false                             # 總開關，預設 false
  vcp_lookback_days: 60                         # VCP 偵測視窗（交易日）
  vcp_min_history_days: 40                      # 不足此歷史長度不計算
  vcp_min_contractions: 2                       # 最少收縮段數（成立門檻）
  vcp_min_quality_score: 70                     # 品質分門檻（valid = 段數達標 && 品質≥此值）
  vcp_use_adjusted_close: false                 # 與 use_adjusted_close 取 OR

  # 品質分權重（和 = 100）
  vcp_tightness_weight: 30                       # 末段收緊程度
  vcp_volume_dryup_weight: 25                    # 後段量縮
  vcp_monotonic_weight: 20                       # 收縮幅度逐段遞減
  vcp_support_hold_weight: 15                    # 低點守住 / 無爆量長黑
  vcp_near_breakout_weight: 10                   # 接近區間上緣（僅計算，不給建議）

  vcp_zigzag_reversal_pct: 1.5                   # swing 高/低反轉門檻（%）；待校準

  # ── MomentumFlow（C5）────────────────────────────────────────────────────
  # 個股動能方向。enable_momentum_flow=false（預設）時完全不計算、不影響既有 scoring /
  # report / watchlist / rotation。RocketStage×MomentumFlow 聯合決策與分數修正屬後續 C6。
  enable_momentum_flow: false                    # 總開關，預設 false
  mf_min_history_days: 30                         # 不足此歷史長度不計算
  mf_accel_short_window: 3                        # 短步調視窗
  mf_accel_long_window: 20                        # 長步調視窗
  mf_accel_pos_thresh: 0.0008                     # accel > 此 → 加速（待校準）
  mf_accel_neg_thresh: -0.0008                    # accel < 此 → 減速（待校準）
  mf_accel_scale: 12000                           # SlopeAccel→分數縮放（待校準）
  mf_key_ma: 20                                   # 結構關鍵均線
  mf_reclaim_lookback: 5                          # 站回 / 跌破關鍵均線的「先前」視窗
  mf_zigzag_reversal_pct: 1.5                     # swing 反轉門檻（與 VCP 同源預設）
  mf_rsi_div_lookback: 20                         # 背離比較視窗
  mf_use_adjusted_close: false                    # 與 use_adjusted_close 取 OR

  kdj:
    k_period: 9
    d_smooth: 3
    j_smooth: 3

  bollinger:
    period: 20
    std_dev: 2.0

report:
  output_dir: ./reports

stocks_file: stocks.yaml           # portfolio / watchlist 清單
sectors_file: configs/sectors.yaml # 族群輪動清單（Rotation）
