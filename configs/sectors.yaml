# ============================================================
# 族群輪動清單（Rotation）
# ============================================================
#
# 用途：以「族群」為單位偵測資金輪動，找出下一波可能接棒的族群。
#       不是顯示今天最強的個股，而是回答「下一波資金可能去哪裡？」。
#
# 格式：
#   sectors:
#     - name: "族群名稱"
#       stocks:
#         - { code: "代號", name: "名稱", market: "TW|TWO|留空" }
#
# market 留空 → 系統自動偵測（先試 .TW，失敗再試 .TWO，結果 cache）。
# 為降低填錯市場的風險，種子資料一律留空走自動偵測。
#
# ⚠️ 以下代號為種子資料（最佳推測），部分上市/上櫃、KY 股請自行複查、增刪。

